kind = "web"
previewPath = "/"
title = "Perfect Parking"
version = "1.0.0"
id = "artifacts/perfect-parking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22236

[services.development]
run = "pnpm --filter @workspace/perfect-parking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perfect-parking", "run", "build" ]
publicDir = "artifacts/perfect-parking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22236"
BASE_PATH = "/"
